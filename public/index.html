<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoloBolo Calendar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@event-calendar/build@5.4.1/dist/event-calendar.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@event-calendar/build@5.4.1/dist/event-calendar.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; height: 100vh; overflow: hidden; padding: 1rem; }
    #ec { height: 100vh; }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none !important;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex !important; }

    /* ── Modal box ── */
    .modal {
      background: #fff;
      border-radius: 12px;
      width: 420px;
      max-width: 92vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: modalIn 0.15s ease-out;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px 14px;
      border-bottom: 1px solid #e5e7eb;
    }
    .modal-header h2 {
      font-size: 17px;
      font-weight: 600;
      color: #111827;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #6b7280;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
    }
    .modal-close:hover { background: #f3f4f6; color: #111827; }

    .modal-body { padding: 18px 22px; }
    .modal-footer {
      padding: 14px 22px 18px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      border-top: 1px solid #e5e7eb;
    }

    /* ── Form fields ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 5px;
    }
    .field input[type="text"],
    .field input[type="date"],
    .field input[type="time"],
    .field textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }
    .field textarea { resize: vertical; min-height: 70px; }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    /* ── Toggle switch ── */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .toggle-row label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #6366f1; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }

    /* ── Color picker ── */
    .color-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.selected { border-color: #111827; }

    /* ── Buttons ── */
    .btn {
      padding: 8px 18px;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-secondary { background: #f3f4f6; color: #374151; border-color: #d1d5db; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }

    /* ── View modal tweaks ── */
    .event-detail-title {
      font-size: 20px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .event-detail-title .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .event-detail-row {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
    }
    .event-detail-row strong {
      color: #374151;
      min-width: 80px;
    }
    .event-description {
      margin-top: 14px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      font-size: 14px;
      color: #374151;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .event-description.empty {
      color: #9ca3af;
      font-style: italic;
    }

    /* ── Add Event button ── */
    .add-event-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 999;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .add-event-btn:hover {
      background: #4f46e5;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
    }
    .add-event-btn svg {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>
  <div id="ec"></div>

  <!-- Floating Add Event button -->
  <button class="add-event-btn" onclick="openCreateModalNow()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Event
  </button>

  <!-- ═══ CREATE / EDIT MODAL ═══ -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="createModalTitle">New Event</h2>
        <button class="modal-close" onclick="closeCreateModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="eventTitle">Title</label>
          <input type="text" id="eventTitle" placeholder="What's happening?" autofocus>
        </div>

        <div class="toggle-row">
          <label>All day</label>
          <div class="toggle">
            <input type="checkbox" id="eventAllDay" onchange="toggleAllDay()">
            <span class="slider"></span>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="eventStartDate">Start date</label>
            <input type="date" id="eventStartDate">
          </div>
          <div class="field time-field">
            <label for="eventStartTime">Start time</label>
            <input type="time" id="eventStartTime">
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="eventEndDate">End date</label>
            <input type="date" id="eventEndDate">
          </div>
          <div class="field time-field">
            <label for="eventEndTime">End time</label>
            <input type="time" id="eventEndTime">
          </div>
        </div>

        <div class="field">
          <label for="eventDesc">Description</label>
          <textarea id="eventDesc" placeholder="Add notes or details..."></textarea>
        </div>

        <div class="field">
          <label>Color</label>
          <div class="color-options" id="colorPicker"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
        <button class="btn btn-primary" id="createModalSave" onclick="saveEvent()">Create</button>
      </div>
    </div>
  </div>

  <!-- ═══ VIEW / DETAIL MODAL ═══ -->
  <div class="modal-overlay" id="viewModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Event Details</h2>
        <button class="modal-close" onclick="closeViewModal()">&times;</button>
      </div>
      <div class="modal-body" id="viewModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="viewDeleteBtn" onclick="deleteFromView()">Delete</button>
        <button class="btn btn-secondary" onclick="closeViewModal()">Close</button>
        <button class="btn btn-primary" id="viewEditBtn" onclick="editFromView()">Edit</button>
      </div>
    </div>
  </div>

  <script>
    // ── Color palette ──
    const COLORS = [
      '#6366f1', '#8b5cf6', '#ec4899', '#ef4444',
      '#f97316', '#eab308', '#22c55e', '#14b8a6',
      '#3b82f6', '#6b7280'
    ];
    let selectedColor = COLORS[0];

    // Build color dots
    const picker = document.getElementById('colorPicker');
    COLORS.forEach(c => {
      const dot = document.createElement('div');
      dot.className = 'color-dot' + (c === selectedColor ? ' selected' : '');
      dot.style.background = c;
      dot.onclick = () => {
        picker.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        dot.classList.add('selected');
        selectedColor = c;
      };
      picker.appendChild(dot);
    });

    // ── State ──
    let ec = null;
    let editingEventId = null;  // null = creating, string = editing
    let viewingEventId = null;

    // ── Helpers ──
    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function toLocalDate(d) {
      // Returns YYYY-MM-DD in local time
      const dt = new Date(d);
      return dt.getFullYear() + '-' +
        String(dt.getMonth() + 1).padStart(2, '0') + '-' +
        String(dt.getDate()).padStart(2, '0');
    }

    function toLocalTime(d) {
      const dt = new Date(d);
      return String(dt.getHours()).padStart(2, '0') + ':' +
        String(dt.getMinutes()).padStart(2, '0');
    }

    function combineDatetime(date, time) {
      return date + 'T' + (time || '00:00') + ':00';
    }

    function formatDateNice(d) {
      const dt = new Date(d);
      return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatTimeNice(d) {
      const dt = new Date(d);
      return dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }

    // ── API ──
    async function apiGet(url) { return (await fetch(url)).json(); }
    async function apiPost(url, data) {
      return (await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })).json();
    }
    async function apiPut(url, data) {
      return (await fetch(url, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })).json();
    }
    async function apiDelete(url) { return (await fetch(url, { method: 'DELETE' })).json(); }

    // ── Toggle all-day ──
    function toggleAllDay() {
      const allDay = document.getElementById('eventAllDay').checked;
      document.querySelectorAll('.time-field').forEach(el => {
        el.style.display = allDay ? 'none' : 'block';
      });
    }

    // ══════════════════════════════════
    //  CREATE / EDIT MODAL
    // ══════════════════════════════════

    // Called from the Add Event button (no date context — defaults to today)
    function openCreateModalNow() {
      const now = new Date();
      openCreateModal({
        start: now,
        end: now,
        allDay: true
      });
    }

    function openCreateModal(info) {
      editingEventId = null;
      document.getElementById('createModalTitle').textContent = 'New Event';
      document.getElementById('createModalSave').textContent = 'Create';
      document.getElementById('eventTitle').value = '';
      document.getElementById('eventDesc').value = '';

      const isAllDay = info.allDay !== undefined ? info.allDay : true;
      document.getElementById('eventAllDay').checked = isAllDay;
      toggleAllDay();

      document.getElementById('eventStartDate').value = toLocalDate(info.start);
      document.getElementById('eventStartTime').value = isAllDay ? '09:00' : toLocalTime(info.start);

      // For end date: if all-day and end equals start (single day click), keep same date
      let endDate = info.end || info.start;
      if (isAllDay && endDate) {
        // EventCalendar gives end as next day for all-day ranges; subtract a day for display
        const ed = new Date(endDate);
        if (ed > new Date(info.start)) {
          ed.setDate(ed.getDate() - 1);
          endDate = ed;
        }
      }
      document.getElementById('eventEndDate').value = toLocalDate(endDate);
      document.getElementById('eventEndTime').value = isAllDay ? '10:00' : toLocalTime(info.end || info.start);

      // Reset color
      selectedColor = COLORS[0];
      picker.querySelectorAll('.color-dot').forEach(d => {
        d.classList.toggle('selected', d.style.background === COLORS[0] || d.style.backgroundColor === COLORS[0]);
      });

      document.getElementById('createModal').classList.add('open');
      setTimeout(() => document.getElementById('eventTitle').focus(), 50);
    }

    function openEditModal(event) {
      editingEventId = event.id;
      document.getElementById('createModalTitle').textContent = 'Edit Event';
      document.getElementById('createModalSave').textContent = 'Save';
      document.getElementById('eventTitle').value = event.title;
      document.getElementById('eventDesc').value =
        (event.extendedProps && event.extendedProps.description) || '';

      const isAllDay = event.allDay;
      document.getElementById('eventAllDay').checked = isAllDay;
      toggleAllDay();

      document.getElementById('eventStartDate').value = toLocalDate(event.start);
      document.getElementById('eventStartTime').value = isAllDay ? '09:00' : toLocalTime(event.start);

      let endDate = event.end || event.start;
      if (isAllDay && endDate) {
        const ed = new Date(endDate);
        if (ed > new Date(event.start)) {
          ed.setDate(ed.getDate() - 1);
          endDate = ed;
        }
      }
      document.getElementById('eventEndDate').value = toLocalDate(endDate);
      document.getElementById('eventEndTime').value = isAllDay ? '10:00' : toLocalTime(event.end || event.start);

      // Set color
      const evColor = event.backgroundColor || event.color || COLORS[0];
      selectedColor = evColor;
      picker.querySelectorAll('.color-dot').forEach(d => {
        const dotColor = d.style.backgroundColor;
        // Compare as rgb or hex
        d.classList.toggle('selected', dotColor === evColor || rgbToHex(dotColor) === evColor);
      });

      document.getElementById('createModal').classList.add('open');
      setTimeout(() => document.getElementById('eventTitle').focus(), 50);
    }

    function closeCreateModal() {
      document.getElementById('createModal').classList.remove('open');
      editingEventId = null;
    }

    async function saveEvent() {
      const title = document.getElementById('eventTitle').value.trim();
      if (!title) {
        document.getElementById('eventTitle').focus();
        return;
      }

      const allDay = document.getElementById('eventAllDay').checked;
      const startDate = document.getElementById('eventStartDate').value;
      const startTime = document.getElementById('eventStartTime').value;
      const endDate = document.getElementById('eventEndDate').value;
      const endTime = document.getElementById('eventEndTime').value;
      const description = document.getElementById('eventDesc').value.trim();

      let start, end;
      if (allDay) {
        start = startDate + 'T00:00:00';
        // For all-day events, EventCalendar expects end to be the NEXT day (exclusive)
        const ed = new Date(endDate + 'T00:00:00');
        ed.setDate(ed.getDate() + 1);
        end = toLocalDate(ed) + 'T00:00:00';
      } else {
        start = combineDatetime(startDate, startTime);
        end = combineDatetime(endDate, endTime);
      }

      if (editingEventId) {
        // Update existing
        const updated = {
          id: editingEventId,
          title, start, end, allDay,
          color: selectedColor,
          description
        };
        try {
          await apiPut('/api/events/' + editingEventId, updated);
          ec.updateEvent({
            ...updated,
            extendedProps: { description }
          });
        } catch (e) {
          console.error('Failed to update event:', e);
          alert('Failed to save. Please try again.');
          return;
        }
      } else {
        // Create new
        const event = {
          id: uid(),
          title, start, end, allDay,
          color: selectedColor,
          description
        };
        try {
          await apiPost('/api/events', event);
          ec.addEvent({
            ...event,
            extendedProps: { description }
          });
        } catch (e) {
          console.error('Failed to create event:', e);
          alert('Failed to save. Please try again.');
          return;
        }
      }

      closeCreateModal();
      ec.unselect();
    }

    // ══════════════════════════════════
    //  VIEW MODAL
    // ══════════════════════════════════
    function openViewModal(event) {
      viewingEventId = event.id;
      const desc = (event.extendedProps && event.extendedProps.description) || '';
      const color = event.backgroundColor || event.color || COLORS[0];

      let timeStr = '';
      if (event.allDay) {
        const startStr = formatDateNice(event.start);
        let endStr = '';
        if (event.end) {
          const endDt = new Date(event.end);
          endDt.setDate(endDt.getDate() - 1);
          const endFormatted = formatDateNice(endDt);
          if (endFormatted !== startStr) {
            endStr = ' — ' + endFormatted;
          }
        }
        timeStr = startStr + endStr + ' (all day)';
      } else {
        timeStr = formatDateNice(event.start) + ', ' + formatTimeNice(event.start);
        if (event.end) {
          const sameDay = toLocalDate(event.start) === toLocalDate(event.end);
          if (sameDay) {
            timeStr += ' – ' + formatTimeNice(event.end);
          } else {
            timeStr += ' – ' + formatDateNice(event.end) + ', ' + formatTimeNice(event.end);
          }
        }
      }

      const body = document.getElementById('viewModalBody');
      body.innerHTML = `
        <div class="event-detail-title">
          <span class="dot" style="background:${color}"></span>
          ${escHtml(event.title)}
        </div>
        <div class="event-detail-row">
          <strong>When</strong>
          <span>${timeStr}</span>
        </div>
        <div class="event-description ${desc ? '' : 'empty'}">
          ${desc ? escHtml(desc) : 'No description'}
        </div>
      `;

      document.getElementById('viewModal').classList.add('open');
    }

    function closeViewModal() {
      document.getElementById('viewModal').classList.remove('open');
      viewingEventId = null;
    }

    function editFromView() {
      // Find the event data and open edit modal
      const events = ec.getEvents();
      const evt = events.find(e => e.id === viewingEventId);
      if (evt) {
        closeViewModal();
        openEditModal(evt);
      }
    }

    async function deleteFromView() {
      if (!viewingEventId) return;
      if (!confirm('Delete this event?')) return;
      try {
        await apiDelete('/api/events/' + viewingEventId);
        ec.removeEventById(viewingEventId);
      } catch (e) {
        console.error('Failed to delete:', e);
        alert('Failed to delete event.');
      }
      closeViewModal();
    }

    // ── Util ──
    function escHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function rgbToHex(rgb) {
      if (!rgb || rgb.startsWith('#')) return rgb;
      const m = rgb.match(/(\d+)/g);
      if (!m || m.length < 3) return rgb;
      return '#' + m.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
    }

    // ── Close modals on Escape or overlay click ──
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeCreateModal();
        closeViewModal();
      }
    });
    document.getElementById('createModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeCreateModal();
    });
    document.getElementById('viewModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeViewModal();
    });

    // ── Enter key to save in create modal ──
    document.getElementById('eventTitle').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveEvent();
    });

    // ══════════════════════════════════
    //  INIT CALENDAR
    // ══════════════════════════════════
    async function init() {
      let events = [];
      try {
        events = await apiGet('/api/events');
      } catch (e) {
        console.error('Failed to load events:', e);
      }

      ec = EventCalendar.create(document.getElementById('ec'), {
        view: 'dayGridMonth',
        headerToolbar: {
          start: 'prev,next today',
          center: 'title',
          end: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
        },
        editable: true,
        events: events,
        eventColor: '#6366f1',
        nowIndicator: true,
        dayMaxEvents: true,

        // Resize calendar to make month cells square
        viewDidMount: function (info) {
          requestAnimationFrame(() => adjustMonthHeight());
        },

        // Click on empty date/time → open create modal
        dateClick: function (info) {
          openCreateModal({
            start: info.date,
            end: info.date,
            allDay: info.allDay !== undefined ? info.allDay : true
          });
        },

        // Click existing event → open view modal
        eventClick: function (info) {
          openViewModal(info.event);
        },

        // Drag to reschedule
        eventDrop: async function (info) {
          var event = info.event;
          try {
            await apiPut('/api/events/' + event.id, {
              id: event.id,
              title: event.title,
              start: event.start,
              end: event.end,
              allDay: event.allDay,
              color: event.backgroundColor
            });
          } catch (e) {
            console.error('Failed to update event:', e);
            info.revert();
          }
        },

        // Resize duration
        eventResize: async function (info) {
          var event = info.event;
          try {
            await apiPut('/api/events/' + event.id, {
              id: event.id,
              title: event.title,
              start: event.start,
              end: event.end,
              allDay: event.allDay,
              color: event.backgroundColor
            });
          } catch (e) {
            console.error('Failed to update event:', e);
            info.revert();
          }
        }
      });
    }

    // ── Make month view cells square (capped at 100vh) ──
    function adjustMonthHeight() {
      const wrapper = document.getElementById('ec');
      const ecEl = wrapper.querySelector('.ec') || wrapper;
      const main = wrapper.querySelector('.ec-main');
      if (!main) return;

      // Only adjust in dayGridMonth
      const isDayGrid = ecEl.classList.contains('ec-day-grid');
      if (!isDayGrid) {
        wrapper.style.height = '100vh';
        main.style.removeProperty('--ec-row-height');
        main.classList.add('ec-uniform');
        return;
      }

      // Count actual day rows
      const dayCells = main.querySelectorAll('.ec-body .ec-day');
      const numRows = dayCells.length > 0 ? Math.ceil(dayCells.length / 7) : 6;

      // Cell width if we went for perfect squares
      const cellWidthIdeal = main.offsetWidth / 7;

      // Measure fixed chrome (toolbar + column headers)
      const toolbar = wrapper.querySelector('.ec-toolbar');
      const toolbarH = toolbar ? toolbar.offsetHeight : 0;
      const header = main.querySelector('.ec-header');
      const headerH = header ? header.offsetHeight : 28;
      const chrome = toolbarH + headerH + 4;

      // Available space for rows within 100vh
      const availableForRows = window.innerHeight - chrome;

      // Use the smaller of: ideal square size, or what fits in viewport
      const rowHeight = Math.min(cellWidthIdeal, availableForRows / numRows);

      main.classList.remove('ec-uniform');
      main.style.setProperty('--ec-row-height', rowHeight + 'px');
      wrapper.style.height = '100vh';
    }

    window.addEventListener('resize', () => {
      adjustMonthHeight();
    });

    init();
  </script>
</body>
</html>
